<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro Food Store</title>
    <link rel="stylesheet" href="../../../login.css">
</head>
<body>
    <header>
        <nav>
            <a class="botonNav" href="../../index.html">Inicio</a>
        </nav>
    </header>

    <main>
        <div class="card">
            <img class="logo" src="../../../assets/logoSinFondo.png" width="150px" alt="Logo">
            <h3 class="titulo">Crea tu cuenta</h3>

            <form class="formulario" id="formRegistro" action="#" method="POST">

                <div class="campo">
                    <label class="contra" for="nombre">Nombre</label>
                    <input type="text" id="nombre" name="nombre" placeholder="Julian" required>
                </div>

                <div class="campo">
                    <label class="contra" for="apellido">Apellido</label>
                    <input type="text" id="apellido" name="apellido" placeholder="Alvarez" required>
                </div>

                <div class="campo">
                    <label class="contra" for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="ejemplo@email.com" required>
                </div>

                <div class="campo">
                    <label class="contra" for="password">Contraseña</label>
                    <input type="password" id="password" name="password" placeholder="********" required>
                </div>

                <button type="submit" class="botonEntrar">Registrarse</button>
            </form>

            <p>¿Ya tenés cuenta? <a class="link" href="../login/login.html">Iniciar Sesión</a></p>
        </div>
    </main>

    <script type="module" src="./registro.ts"></script>
</body>
</html>
